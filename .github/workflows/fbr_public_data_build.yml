name: FBR Public Data Build

on:
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/fbr_public_data_build.yml'
      - 'tools/build_fbr_public_data.py'

permissions:
  contents: read

jobs:
  build-public-data:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Build checksum-verified research snapshot
        env:
          FBR_OUTPUT_DIR: fbr_public_data_output
        run: python tools/build_fbr_public_data.py
      - name: Validate artifact manifest
        run: |
          test -s fbr_public_data_output/audit/data_manifest.json
          test -s fbr_public_data_output/normalized/btcusdt_trade_1m_research.csv.gz
          test -s fbr_public_data_output/normalized/btcusdt_mark_1m_research.csv.gz
          test -s fbr_public_data_output/normalized/btcusdt_funding_research.csv.gz
          (cd fbr_public_data_output && sha256sum -c SHA256SUMS)
      - name: Upload immutable research snapshot
        uses: actions/upload-artifact@v4
        with:
          name: fbr-btcusdt-public-data-through-2026-07-20
          path: fbr_public_data_output/
          if-no-files-found: error
          compression-level: 0
          retention-days: 7
